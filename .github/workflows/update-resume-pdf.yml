name: Update generated resume PDF

"on":
  push:
    branches:
      - main
    paths:
      - resume-print.html
      - styles-print.css
      - 1641814386890.jpg
      - convert_resume_print.py
      - .github/workflows/update-resume-pdf.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-resume-pdf:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Playwright
        run: python -m pip install --upgrade playwright

      - name: Install Chromium and system dependencies
        run: python -m playwright install --with-deps chromium

      - name: Generate resume PDF
        run: python convert_resume_print.py

      - name: Commit regenerated PDF if needed
        run: |
          if git diff --quiet -- resume.pdf; then
            echo "resume.pdf is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resume.pdf
          git commit -m "Update generated resume PDF"
          git push
